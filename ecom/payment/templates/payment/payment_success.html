{% extends "base.html" %}

{% block content %}

<style>
/* ===============================
   Header Styling
================================*/
.success-header {
    background: linear-gradient(135deg, #1e1e1e 0%, #000000 100%);
    padding: 100px 0 140px 0; /* Extra padding for overlap effect */
}

.success-header h1 {
    letter-spacing: -1px;
    font-weight: 800;
    animation: fadeDown 1s ease forwards;
}

.success-header p {
    animation: fadeUp 1.2s ease forwards;
    color: #a0a0a0 !important;
}

/* ===============================
   Premium Card (Overlapping Effect)
================================*/
.success-card {
    background: #ffffff;
    border-radius: 24px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.08);
    border: 1px solid #f0f0f0;
    margin-top: -80px; /* Pulls the card up into the dark header */
    position: relative;
    z-index: 10;
    padding: 60px 40px;
    text-align: center;
}

/* ===============================
   Success Icon Animation
================================*/
.success-icon-wrapper {
    margin-bottom: 25px;
}

.success-icon {
    font-size: 6rem;
    color: #198754; /* Success Green */
    display: inline-block;
    opacity: 0;
    transform: scale(0.5);
    animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    animation-delay: 0.2s; /* Slight delay so it pops after page loads */
    text-shadow: 0 10px 20px rgba(25, 135, 84, 0.2);
}

/* ===============================
   Premium Button
================================*/
.btn-premium {
    border-radius: 30px;
    padding: 14px 36px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    background: linear-gradient(135deg, #212529, #000);
    color: white;
    border: none;
    transition: all 0.3s ease;
    display: inline-block;
}

.btn-premium:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.25);
    color: white;
}

.btn-premium:active, .btn-premium:focus {
    background: #000 !important;
    color: white !important; 
    box-shadow: inset 0 3px 5px rgba(0,0,0,0.2) !important;
    outline: none !important;
    transform: translateY(1px);
}

/* Animations */
@keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes popIn { 
    0% { opacity: 0; transform: scale(0.5); } 
    70% { transform: scale(1.1); }
    100% { opacity: 1; transform: scale(1); } 
}
</style>

<header class="success-header text-center">
    <div class="container px-4 px-lg-5">
        <h1 class="display-4 text-white">Payment Successful!</h1>
        <p class="lead fw-normal mb-0">Thank you for your purchase</p>
    </div>
</header>

<div class="container pb-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-7">
            
            <div class="card success-card">
                
                <div class="success-icon-wrapper">
                    <i class="bi-check-circle-fill success-icon"></i>
                </div>
                
                <h2 class="mt-2 fw-bold text-dark">Your order has been placed!</h2>
                
                <p class="lead text-muted mt-3 mb-5 px-md-4" style="font-size: 1.1rem; line-height: 1.7;">
                    We have received your payment and your order is currently being processed. You will receive an email confirmation shortly.
                </p>
                
                <div>
                    <a href="{% url 'home' %}" class="btn btn-premium btn-lg">
                        <i class="bi-bag me-2"></i>Return to Store
                    </a>
                </div>
                
            </div>
            
        </div>
    </div>
</div>

<br><br><br>

{% endblock %}

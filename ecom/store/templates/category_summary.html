{% extends "base.html" %}

{% block content %}

<style>
/* ===============================
   Header Styling
================================*/
.category-header {
    background: linear-gradient(135deg, #1e1e1e 0%, #000000 100%);
    padding: 100px 0 140px 0; /* Extra padding for overlap effect */
}

.category-header h1 {
    letter-spacing: -1px;
    font-weight: 800;
    animation: fadeDown 1s ease forwards;
}

.category-header p {
    animation: fadeUp 1.2s ease forwards;
    color: #a0a0a0 !important;
}

/* ===============================
   Card Grid (Overlapping Effect)
================================*/
.category-container {
    margin-top: -80px; /* Pulls the grid up into the dark header */
    position: relative;
    z-index: 10;
}

.premium-card {
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.06);
    border: 1px solid #f0f0f0;
    transition: all 0.4s ease;
    padding: 10px 0;
}

.premium-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 25px 50px rgba(0,0,0,0.12);
    border-color: #e8e8e8;
}

.category-title {
    font-weight: 800;
    font-size: 1.5rem;
    color: #212529;
    text-transform: capitalize;
    letter-spacing: -0.5px;
}

/* ===============================
   Premium Button
================================*/
.btn-premium {
    border-radius: 30px;
    padding: 10px 24px;
    font-weight: 700;
    text-transform: uppercase;
    font-size: 0.85rem;
    letter-spacing: 1px;
    background: linear-gradient(135deg, #212529, #000);
    color: white;
    border: none;
    transition: all 0.3s ease;
}

.btn-premium:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.25);
    color: white;
}

.btn-premium:active, .btn-premium:focus {
    background: #000 !important;
    color: white !important; 
    box-shadow: inset 0 3px 5px rgba(0,0,0,0.2) !important;
    outline: none !important;
    transform: translateY(1px);
}

/* ===============================
   Animations
================================*/
@keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>

<header class="category-header text-center">
    <div class="container px-4 px-lg-5">
        <h1 class="display-4 text-white">Categories</h1>
        <p class="lead fw-normal mb-0">Browse products by category</p>
    </div>
</header>

<section class="pb-5 bg-light">
    <div class="container px-4 px-lg-5 category-container">
        <div class="row gx-4 gx-lg-5 row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-xl-4 justify-content-center">
            
            {% if categories %}
                {% for category in categories %}
                    
                    <div class="col mb-5">
                        <div class="card h-100 premium-card">
                            <div class="card-body p-4 d-flex align-items-center justify-content-center">
                                <div class="text-center">
                                    <h5 class="category-title mb-0">{{ category.name }}</h5>
                                </div>
                            </div>
                            <div class="card-footer p-4 pt-0 border-top-0 bg-transparent">
                                <div class="text-center">
                                    <a class="btn btn-premium mt-auto w-100" href="{% url 'category' category.name %}">View Products</a>
                                </div>
                            </div>
                        </div>
                    </div>

                {% endfor %}

            {% else %}
                <div class="col-12 text-center">
                    <div class="card premium-card p-5 mt-4">
                        <h3 class="fw-bold text-muted mb-0">No categories have been added yet!</h3>
                        <p class="mt-3 text-muted">Check back later for new products.</p>
                    </div>
                </div>
            {% endif %}

        </div>
    </div>
</section>

{% endblock %}

{% extends "base.html" %}
{% block content %}
<style>
/* Include your exact same login-header, login-card, custom-input, and btn-premium CSS from login.html here */
.login-header { background: linear-gradient(135deg, #1e1e1e 0%, #000000 100%); padding: 100px 0 140px 0; }
.login-header h1 { letter-spacing: -1px; font-weight: 800; animation: fadeDown 1s ease forwards; }
.login-header p { animation: fadeUp 1.2s ease forwards; color: #a0a0a0 !important; }
.login-card { background: #ffffff; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.08); border: 1px solid #f0f0f0; margin-top: -80px; position: relative; z-index: 10; transition: all 0.4s ease; }
.custom-input { border-radius: 14px; padding: 14px 18px; border: 2px solid #e9ecef; background-color: #fcfcfc; font-weight: 500; transition: all 0.3s ease; width: 100%; display: block; margin-bottom: 15px;}
.custom-input:focus { border-color: #212529; background-color: #ffffff; box-shadow: 0 0 0 4px rgba(33, 37, 41, 0.08); outline: none; }
.input-label { font-weight: 700; font-size: 0.85rem; color: #6c757d; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; display: block;}
.btn-premium { border-radius: 30px; padding: 14px 24px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; background: linear-gradient(135deg, #212529, #000); color: white; border: none; transition: all 0.3s ease; width: 100%;}
.btn-premium:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.25); color: white; }
@keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>

<header class="login-header text-center">
    <div class="container px-4 px-lg-5">
        <h1 class="display-4 text-white">Reset Password</h1>
        <p class="lead fw-normal mb-0">Enter your email to receive a reset link</p>
    </div>
</header>
<div class="container pb-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card login-card">
                <div class="card-body p-5">
                    <h3 class="text-center mb-4 fw-bold text-dark">Forgot Password?</h3>
                    <p class="text-muted text-center mb-4">Enter the email address associated with your account and we will send you instructions to reset your password.</p>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="form-label input-label">Email Address</label>
                            {{ form.email }}
                        </div>
                        <div class="d-grid mt-5">
                            <button type="submit" class="btn btn-premium btn-lg">Send Reset Email</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script>document.querySelector('input[name="email"]').classList.add('custom-input');</script>
{% endblock %}

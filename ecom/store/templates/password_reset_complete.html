{% extends "base.html" %}
{% block content %}
<style>
.login-header { background: linear-gradient(135deg, #1e1e1e 0%, #000000 100%); padding: 100px 0 140px 0; }
.login-header h1 { letter-spacing: -1px; font-weight: 800; animation: fadeDown 1s ease forwards; }
.login-header p { animation: fadeUp 1.2s ease forwards; color: #a0a0a0 !important; }
.login-card { background: #ffffff; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.08); border: 1px solid #f0f0f0; margin-top: -80px; position: relative; z-index: 10; transition: all 0.4s ease; }
.btn-premium { border-radius: 30px; padding: 14px 24px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; background: linear-gradient(135deg, #212529, #000); color: white; border: none; transition: all 0.3s ease; text-decoration: none; display: inline-block;}
.btn-premium:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.25); color: white; }
@keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
<header class="login-header text-center">
    <div class="container px-4 px-lg-5">
        <h1 class="display-4 text-white">Success!</h1>
        <p class="lead fw-normal mb-0">Your password has been changed</p>
    </div>
</header>
<div class="container pb-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card login-card text-center p-5">
                <i class="bi-shield-check text-success mb-3" style="font-size: 3rem;"></i>
                <h3 class="fw-bold text-dark mb-3">Password Updated</h3>
                <p class="text-muted mb-5">Your password has been set. You may go ahead and log in now.</p>
                <a href="{% url 'login' %}" class="btn btn-premium px-5">Return to Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
